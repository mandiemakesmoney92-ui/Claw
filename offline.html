<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAW — You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      padding: 2rem;
      max-width: 340px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.96); }
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #FF3C00;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #FF3C00;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .tagline {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">🐱</span>
    <h1>Ringy can't reach the server</h1>
    <p>You're offline right now. CLAW needs a connection to load your feed and messages. Check your signal and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
    <p class="tagline">CLAW — Mystic Hidden Gem</p>
  </div>
</body>
</html>
